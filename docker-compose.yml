services:
  blazor:
    build:
      context: ./The Triad PC
      dockerfile: Dockerfile
    container_name: thetriadpc
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - CHAT_API_URL=http://gabo-ai:8080/chat
    depends_on:
      - gabo-ai
    restart: unless-stopped
    networks:
      - npm_default
      - default

  gabo-ai:
    build:
      context: ./Gabo AI
      dockerfile: Dockerfile
    container_name: triadpc-gabo-ai
    expose:
      - "8080"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - npm_default
      - default

networks:
  npm_default:
    external: true
